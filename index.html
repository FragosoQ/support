<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SupportDesk</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; background:#F0F2F7;">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useMemo, useEffect, useCallback } = React;

    const API_URL = "https://script.google.com/macros/s/AKfycbzwf3gycYhoGs9zrs0ZNkUn7foBqAAJMO8Y-rstCmCKpT-bykZxIClWj5XbdJJ0WLoo-Q/exec";
    const USE_MOCK = false;

    const MOCK_DATA = [
      { ID:"T0001", MENSAGEM:"Não consigo aceder à minha conta.", "N.º DE CONTACTO":"912345678", NOME:"Ana Ferreira", TIMESTAMP:"2024-03-01T09:15:00", STATUS:"Aberto", Responsável:"João Silva", "Current Status":"Em Progresso", "Resolução [descritivo]":"", Check:"", "Data de Conclusão":"", "Lead Time":"" },
      { ID:"T0002", MENSAGEM:"Fatura com valor incorreto.", "N.º DE CONTACTO":"912345678", NOME:"Ana Ferreira", TIMESTAMP:"2024-03-05T14:30:00", STATUS:"Aberto", Responsável:"Maria Santos", "Current Status":"Aguarda Cliente", "Resolução [descritivo]":"Enviado email.", Check:"", "Data de Conclusão":"", "Lead Time":"" },
    ];

    const STATUS_CFG = {
      "Aberto":          { bg:"#E8F4FD", text:"#1A6FA3", dot:"#2196F3" },
      "Em Progresso":    { bg:"#FFF8E1", text:"#B07A00", dot:"#FFC107" },
      "Aguarda Cliente": { bg:"#FFF3E0", text:"#C05E00", dot:"#FF9800" },
      "Escalado":        { bg:"#FCE4EC", text:"#A0002B", dot:"#E91E63" },
      "Resolvido":       { bg:"#E8F5E9", text:"#1B6B2A", dot:"#4CAF50" },
      "Fechado":         { bg:"#F3E5F5", text:"#5B2C7E", dot:"#9C27B0" },
    };

    const GROUP_STATUS_CFG = {
      "Requer Atuacao": { bg:"#FEE2E2", text:"#B91C1C", dot:"#EF4444" },
      "Aguardar Cliente": { bg:"#FFF7ED", text:"#C2410C", dot:"#FB923C" },
      "Concluido": { bg:"#ECFDF5", text:"#047857", dot:"#10B981" },
    };

    const NEEDS_ACTION = new Set(["Aberto", "Em Progresso", "Escalado"]);
    const WAITING_CLIENT = new Set(["Aguarda Cliente"]);

    const ALL_STATUSES = Object.keys(STATUS_CFG);
    const IS = { width:"100%", padding:"9px 12px", border:"1.5px solid #E2E8F0", borderRadius:8, fontSize:13, outline:"none", color:"#1C1F2E", background:"#fff", boxSizing:"border-box", fontFamily:"inherit" };
    const BP = { padding:"9px 18px", background:"#4F46E5", color:"#fff", border:"none", borderRadius:8, fontSize:13, fontWeight:600, cursor:"pointer" };
    const BS = { padding:"9px 18px", background:"#F1F5F9", color:"#334155", border:"none", borderRadius:8, fontSize:13, fontWeight:600, cursor:"pointer" };
    const LS = { fontSize:10, fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.08em", display:"block", marginBottom:6 };

    const Badge = ({ status, sm }) => {
      const c = STATUS_CFG[status] || { bg:"#F5F5F5", text:"#666", dot:"#999" };
      return (
        <span style={{display:"inline-flex",alignItems:"center",gap:sm?4:6,background:c.bg,color:c.text,padding:sm?"2px 8px":"4px 10px",borderRadius:20,fontSize:sm?11:12,fontWeight:600,whiteSpace:"nowrap"}}>
          <span style={{width:sm?6:7,height:sm?6:7,borderRadius:"50%",background:c.dot,flexShrink:0}}/>
          {status}
        </span>
      );
    };

    const GroupBadge = ({ status }) => {
      const c = GROUP_STATUS_CFG[status] || { bg:"#F1F5F9", text:"#475569", dot:"#94A3B8" };
      return (
        <span style={{display:"inline-flex",alignItems:"center",gap:6,background:c.bg,color:c.text,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:c.dot,flexShrink:0}}/>
          {status}
        </span>
      );
    };

    const Ava = ({ name, size=28 }) => {
      const n = name || "?";
      const ini = n.split(" ").map((w) => w[0]).slice(0,2).join("").toUpperCase();
      const p = ["#4F46E5", "#0891B2", "#059669", "#D97706", "#DC2626", "#7C3AED"];
      return <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size,borderRadius:"50%",background:p[n.charCodeAt(0)%p.length],color:"#fff",fontSize:size*0.36,fontWeight:700,flexShrink:0}}>{ini}</span>;
    };

    const fmt = (ts) => ts ? new Date(ts).toLocaleDateString("pt-PT",{day:"2-digit",month:"short",year:"numeric"}) : "-";
    const fmtT = (ts) => ts ? new Date(ts).toLocaleTimeString("pt-PT",{hour:"2-digit",minute:"2-digit"}) : "";
    const Spinner = () => <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60}}><div style={{width:32,height:32,border:"3px solid #E2E8F0",borderTopColor:"#4F46E5",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;

    const isResolutionChecked = (ticket) => {
      const v = ticket?.Check ?? ticket?.["Check Resolução"];
      if (typeof v === "boolean") return v;
      if (typeof v === "number") return v === 1;
      const s = String(v || "").trim().toLowerCase();
      return ["true", "1", "sim", "yes", "x", "checked", "check"].includes(s);
    };

    const getGroupStatus = (groupTickets) => {
      const statuses = groupTickets.map((t) => t["Current Status"]).filter(Boolean);
      const allChecked = groupTickets.length > 0 && groupTickets.every((t) => isResolutionChecked(t));
      const allClosed = groupTickets.length > 0 && groupTickets.every((t) => ["Resolvido", "Fechado"].includes(t["Current Status"]));
      if (allClosed && allChecked) return "Concluido";
      if (statuses.some((s) => NEEDS_ACTION.has(s))) return "Requer Atuacao";
      if (statuses.some((s) => WAITING_CLIENT.has(s))) return "Aguardar Cliente";
      return "Requer Atuacao";
    };

    function TicketModal({ ticket, onClose, onUpdate, startEditing=false }) {
      const [editing, setEditing] = useState(startEditing);
      const [form, setForm] = useState({"Current Status":ticket["Current Status"],Responsável:ticket["Responsável"],"Resolução [descritivo]":ticket["Resolução [descritivo]"],Check:isResolutionChecked(ticket)?"check":""});
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState("");

      const save = async () => {
        setSaving(true);
        try {
          if (USE_MOCK) {
            await new Promise((r) => setTimeout(r, 500));
          } else {
            const r = await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"updateTicket",id:ticket.ID,fields:form})});
            const d = await r.json();
            if(d.error) throw new Error(d.error);
          }
          onUpdate && onUpdate(ticket.ID, form);
          setMsg("Guardado com sucesso");
          setEditing(false);
        } catch(e) {
          setMsg("Erro: " + e.message);
        }
        setSaving(false);
        setTimeout(() => setMsg(""), 3000);
      };

      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:24}}>
          <div onClick={(e) => e.stopPropagation()} style={{background:"#fff",borderRadius:18,maxWidth:580,width:"100%",maxHeight:"88vh",overflow:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.22)"}}>
            <div style={{padding:"22px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"monospace",fontSize:12,color:"#4F46E5",background:"#EEF2FF",padding:"2px 8px",borderRadius:6,fontWeight:600}}>{ticket.ID}</span>
                  <Badge status={editing?form["Current Status"]:ticket["Current Status"]}/>
                </div>
                <div style={{fontWeight:700,fontSize:15,color:"#1C1F2E"}}>{ticket.NOME}</div>
                <div style={{fontSize:12,color:"#94A3B8",fontFamily:"monospace"}}>{ticket["N.º DE CONTACTO"]}</div>
              </div>
              <button onClick={onClose} style={{border:"none",background:"#F1F5F9",width:32,height:32,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <div style={{padding:24}}>
              <div style={{marginBottom:18}}><label style={LS}>Mensagem</label><p style={{margin:0,fontSize:13,color:"#334155",lineHeight:1.7,background:"#F8FAFC",borderRadius:10,padding:"12px 14px",borderLeft:"3px solid #4F46E5",whiteSpace:"pre-wrap"}}>{ticket.MENSAGEM}</p></div>
              {editing ? (
                <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>
                  <div><label style={LS}>Current Status</label><select value={form["Current Status"]} onChange={(e)=>setForm((f)=>({...f,"Current Status":e.target.value}))} style={IS}>{ALL_STATUSES.map((s)=><option key={s}>{s}</option>)}</select></div>
                  <div><label style={LS}>Responsavel</label><input value={form.Responsável||""} onChange={(e)=>setForm((f)=>({...f,Responsável:e.target.value}))} style={IS}/></div>
                  <div><label style={LS}>Resolucao [descritivo]</label><textarea value={form["Resolução [descritivo]"]||""} rows={3} onChange={(e)=>setForm((f)=>({...f,"Resolução [descritivo]":e.target.value}))} style={{...IS,resize:"vertical"}}/></div>
                  <label style={{display:"inline-flex",alignItems:"center",gap:8,fontSize:13,color:"#334155",fontWeight:500,cursor:"pointer"}}>
                    <input type="checkbox" checked={form.Check==="check"} onChange={(e)=>setForm((f)=>({...f,Check:e.target.checked?"check":""}))} style={{width:16,height:16,cursor:"pointer"}}/>
                    Check de resolucao validado
                  </label>
                  <div style={{display:"flex",gap:8}}><button onClick={save} disabled={saving} style={BP}>{saving?"A guardar...":"Guardar"}</button><button onClick={()=>setEditing(false)} style={BS}>Cancelar</button></div>
                  {msg&&<div style={{fontSize:12,color:msg.startsWith("Erro")?"#DC2626":"#059669",fontWeight:500}}>{msg}</div>}
                </div>
              ) : (
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
                    {[{l:"Responsavel",v:ticket.Responsável||"-"},{l:"Status inicial",v:ticket.STATUS},{l:"Data de entrada",v:`${fmt(ticket.TIMESTAMP)} ${fmtT(ticket.TIMESTAMP)}`},{l:"Lead Time",v:ticket["Lead Time"]||"-"},{l:"Data de conclusao",v:fmt(ticket["Data de Conclusão"])},{l:"Check resolucao",v:isResolutionChecked(ticket)?"Sim":"Nao"}].map(({l,v})=>(
                      <div key={l} style={{background:"#F8FAFC",borderRadius:10,padding:"10px 14px"}}><div style={LS}>{l}</div><div style={{fontSize:13,color:"#1C1F2E",fontWeight:500}}>{v}</div></div>
                    ))}
                  </div>
                  {ticket["Resolução [descritivo]"]&&<div style={{marginBottom:18}}><label style={LS}>Resolucao</label><p style={{margin:0,fontSize:13,color:"#334155",lineHeight:1.6,background:"#F0FDF4",borderRadius:10,padding:"12px 14px",borderLeft:"3px solid #10B981"}}>{ticket["Resolução [descritivo]"]}</p></div>}
                  <button onClick={()=>setEditing(true)} style={BP}>Editar ticket</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [tickets,setTickets]=useState([]);
      const [loading,setLoading]=useState(true);
      const [error,setError]=useState(null);
      const [search,setSearch]=useState("");
      const [filterStatus,setFS]=useState("Todos");
      const [filterResp,setFR]=useState("Todos");
      const [expanded,setExpanded]=useState({});
      const [selected,setSelected]=useState(null);
      const [startEditingTicketId,setStartEditingTicketId]=useState(null);
      const [lastSync,setLastSync]=useState(null);

      const fetchData=useCallback(async()=>{
        setLoading(true);setError(null);
        try {
          if(USE_MOCK){
            await new Promise((r)=>setTimeout(r,600));setTickets(MOCK_DATA);
          } else {
            const r=await fetch(`${API_URL}?action=getTickets`,{redirect:"follow"});
            const d=await r.json();
            if(d.error)throw new Error(d.error);
            setTickets(d.tickets||[]);
          }
          setLastSync(new Date());
        } catch(e) {
          setError(e.message);
        }
        setLoading(false);
      },[]);

      useEffect(()=>{fetchData();},[fetchData]);
      useEffect(()=>{const id=setInterval(fetchData,60000);return()=>clearInterval(id);},[fetchData]);
      const handleUpdate=useCallback((id,fields)=>{setTickets((p)=>p.map((t)=>t.ID===id?{...t,...fields}:t));setSelected((p)=>p&&p.ID===id?{...p,...fields}:p);},[]);
      const allResp=useMemo(()=>["Todos",...Array.from(new Set(tickets.map((t)=>t.Responsável).filter(Boolean)))],[tickets]);
      const filtered=useMemo(()=>tickets.filter((t)=>{const q=search.toLowerCase();return(!search||t.NOME?.toLowerCase().includes(q)||t["N.º DE CONTACTO"]?.includes(q)||t.ID?.toLowerCase().includes(q)||t.MENSAGEM?.toLowerCase().includes(q))&&(filterStatus==="Todos"||t["Current Status"]===filterStatus)&&(filterResp==="Todos"||t.Responsável===filterResp);}),[tickets,search,filterStatus,filterResp]);
      const grouped=useMemo(()=>{const m={};filtered.forEach((t)=>{const k=t["N.º DE CONTACTO"];if(!m[k])m[k]={contact:k,nome:t.NOME,tickets:[]};m[k].tickets.push(t);});return Object.values(m).sort((a,b)=>Math.max(...b.tickets.map((t)=>+new Date(t.TIMESTAMP||0)))-Math.max(...a.tickets.map((t)=>+new Date(t.TIMESTAMP||0))));},[filtered]);
      const stats=useMemo(()=>{const s={};tickets.forEach((t)=>{const cs=t["Current Status"]||"Sem Estado";s[cs]=(s[cs]||0)+1;});return s;},[tickets]);

      return(
        <div style={{minHeight:"100vh",background:"#F0F2F7",fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
          <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}*{box-sizing:border-box}`}</style>

          <div style={{background:"#1C1F2E",padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:32,height:32,background:"linear-gradient(135deg,#4F46E5,#818CF8)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <span style={{color:"#fff",fontWeight:700,fontSize:16,letterSpacing:"-0.02em"}}>SupportDesk</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {lastSync&&<span style={{color:"#94A3B8",fontSize:11}}>sync {fmtT(lastSync.toISOString())}</span>}
              <button onClick={fetchData} disabled={loading} style={{border:"1.5px solid #334155",background:"transparent",color:"#94A3B8",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{animation:loading?"spin 0.8s linear infinite":"none"}}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                Atualizar
              </button>
            </div>
          </div>

          <div style={{maxWidth:1120,margin:"0 auto",padding:"28px 24px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:22}}>
              {Object.entries(stats).map(([s,c])=>{const cfg=STATUS_CFG[s]||{};return(<div key={s} onClick={()=>setFS(filterStatus===s?"Todos":s)} style={{background:"#fff",borderRadius:12,padding:"14px 16px",cursor:"pointer",border:filterStatus===s?`2px solid ${cfg.dot}`:"2px solid transparent",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",transition:"all 0.15s"}}><div style={{fontSize:22,fontWeight:700,color:cfg.dot||"#333"}}>{c}</div><div style={{fontSize:11,color:"#64748B",fontWeight:500,marginTop:2}}>{s}</div></div>);})}
              <div onClick={()=>setFS("Todos")} style={{background:"#1C1F2E",borderRadius:12,padding:"14px 16px",cursor:"pointer"}}><div style={{fontSize:22,fontWeight:700,color:"#fff"}}>{tickets.length}</div><div style={{fontSize:11,color:"#94A3B8",fontWeight:500,marginTop:2}}>Total</div></div>
            </div>

            <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{position:"relative",flex:"1 1 240px"}}>
                <svg style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",opacity:0.35}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1F2E" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input value={search} onChange={(e)=>setSearch(e.target.value)} placeholder="Pesquisar nome, contacto, ID, mensagem..." style={{...IS,paddingLeft:34,border:"1.5px solid #E2E8F0"}}/>
              </div>
              <select value={filterStatus} onChange={(e)=>setFS(e.target.value)} style={{...IS,width:"auto"}}><option>Todos</option>{ALL_STATUSES.map((s)=><option key={s}>{s}</option>)}</select>
              <select value={filterResp} onChange={(e)=>setFR(e.target.value)} style={{...IS,width:"auto"}}>{allResp.map((r)=><option key={r}>{r}</option>)}</select>
              <span style={{fontSize:12,color:"#94A3B8"}}>{grouped.length} contacto(s) | {filtered.length} ticket(s)</span>
            </div>

            {loading&&<Spinner/>}
            {error&&(
              <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,padding:"16px 20px",color:"#B91C1C",fontSize:13}}>
                Erro ao carregar dados: {error}
                <br/><span style={{fontSize:11,color:"#94A3B8",marginTop:4,display:"block"}}>Confirma que o Web App esta publicado com acesso "Qualquer pessoa".</span>
              </div>
            )}

            {!loading&&!error&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {grouped.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"#94A3B8",fontSize:14}}>Nenhum resultado encontrado.</div>}
                {grouped.map((group)=>{
                  const isOpen=expanded[group.contact];
                  const sorted=[...group.tickets].sort((a,b)=>new Date(b.TIMESTAMP)-new Date(a.TIMESTAMP));
                  const last=sorted[0];
                  const summ=group.tickets.reduce((acc,t)=>{const cs=t["Current Status"]||"?";acc[cs]=(acc[cs]||0)+1;return acc;},{});
                  const groupStatus = getGroupStatus(group.tickets);
                  const hasOpen=group.tickets.some((t)=>!["Resolvido","Fechado"].includes(t["Current Status"]));
                  return(
                    <div key={group.contact} style={{background:"#fff",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:hasOpen?"1.5px solid #E0E7FF":"1.5px solid #F1F5F9"}}>
                      <div onClick={()=>setExpanded((e)=>({...e,[group.contact]:!e[group.contact]}))} style={{padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,userSelect:"none"}}>
                        <Ava name={group.nome} size={38}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
                            <div style={{fontWeight:600,fontSize:14,color:"#1C1F2E"}}>{group.nome}</div>
                            <GroupBadge status={groupStatus}/>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <span style={{fontFamily:"monospace",fontSize:12,color:"#64748B"}}>{group.contact}</span>
                            <span style={{color:"#CBD5E1"}}>|</span>
                            <span style={{fontSize:12,color:"#94A3B8"}}>ultimo: {fmt(last.TIMESTAMP)} {fmtT(last.TIMESTAMP)}</span>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                          {Object.entries(summ).map(([s,c])=>(<span key={s} style={{display:"inline-flex",alignItems:"center",gap:4,background:STATUS_CFG[s]?.bg||"#F5F5F5",color:STATUS_CFG[s]?.text||"#666",padding:"3px 8px",borderRadius:20,fontSize:11,fontWeight:600}}><span style={{width:6,height:6,borderRadius:"50%",background:STATUS_CFG[s]?.dot||"#999"}}/>{c}x {s}</span>))}
                        </div>
                        <div style={{color:"#94A3B8",marginLeft:8,transition:"transform 0.2s",transform:isOpen?"rotate(180deg)":"rotate(0)"}}>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                      </div>
                      {isOpen&&(
                        <div style={{borderTop:"1px solid #F1F5F9"}}>
                          {sorted.map((ticket,i)=>(
                            <div key={ticket.ID} onClick={()=>{setStartEditingTicketId(null);setSelected(ticket);}} style={{padding:"13px 20px 13px 72px",borderBottom:i<sorted.length-1?"1px solid #F8FAFC":"none",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:12,transition:"background 0.1s"}} onMouseEnter={(e)=>e.currentTarget.style.background="#F8FAFC"} onMouseLeave={(e)=>e.currentTarget.style.background="transparent"}>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                                  <span style={{fontFamily:"monospace",fontSize:11,color:"#4F46E5",fontWeight:600,background:"#EEF2FF",padding:"1px 6px",borderRadius:4}}>{ticket.ID}</span>
                                  <Badge status={ticket["Current Status"]} sm/>
                                  <span style={{display:"inline-flex",alignItems:"center",gap:4,background:isResolutionChecked(ticket)?"#ECFDF5":"#F8FAFC",color:isResolutionChecked(ticket)?"#047857":"#64748B",padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700}}>{isResolutionChecked(ticket)?"Resolucao checked":"Sem check"}</span>
                                </div>
                                <p style={{margin:0,fontSize:13,color:"#334155",lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:460}}>{ticket.MENSAGEM}</p>
                                {ticket["Resolução [descritivo]"]&&<p style={{margin:"3px 0 0",fontSize:11,color:"#94A3B8",fontStyle:"italic"}}>{ticket["Resolução [descritivo]"]}</p>}
                              </div>
                              <div style={{textAlign:"right",flexShrink:0}}>
                                <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",marginBottom:3}}><Ava name={ticket.Responsável||"?"} size={20}/><span style={{fontSize:11,color:"#64748B"}}>{ticket.Responsável||"-"}</span></div>
                                <div style={{fontSize:11,color:"#94A3B8"}}>{fmt(ticket.TIMESTAMP)} {fmtT(ticket.TIMESTAMP)}</div>
                                {ticket["Lead Time"]&&<div style={{fontSize:11,color:"#10B981",fontWeight:600,marginTop:2}}>{ticket["Lead Time"]}</div>}
                                <button
                                  onClick={(e)=>{e.stopPropagation();setStartEditingTicketId(ticket.ID);setSelected(ticket);}}
                                  title="Editar ticket"
                                  aria-label="Editar ticket"
                                  style={{marginTop:6,border:"1px solid #E2E8F0",background:"#fff",color:"#475569",borderRadius:8,padding:"4px 7px",fontSize:11,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}
                                >
                                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                  Editar
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {selected&&<TicketModal ticket={selected} startEditing={selected.ID===startEditingTicketId} onClose={()=>{setSelected(null);setStartEditingTicketId(null);}} onUpdate={handleUpdate}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
